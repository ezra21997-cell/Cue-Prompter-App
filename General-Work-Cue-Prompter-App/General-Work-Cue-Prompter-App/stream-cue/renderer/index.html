<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stream Cue</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════════
       CUSTOM TITLE BAR
  ═══════════════════════════════════════════════════════════ -->
  <div id="titlebar">
    <div id="titlebar-drag"></div>
    <div id="window-controls">
      <button class="win-btn" id="btn-close"    title="Close">&#215;</button>
      <button class="win-btn" id="btn-minimize" title="Minimize">&#8722;</button>
      <button class="win-btn" id="btn-maximize" title="Maximize">&#9633;</button>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════
       EDIT VIEW
  ═══════════════════════════════════════════════════════════ -->
  <div id="edit-view" class="view active">
    <div id="edit-container">

      <!-- Header -->
      <div id="edit-header">
        <div id="app-logo">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="28" height="28" rx="8" fill="#4f8ef7"/>
            <!-- Cue card lines -->
            <rect x="5" y="7"  width="14" height="2" rx="1" fill="white"/>
            <rect x="5" y="12" width="18" height="2" rx="1" fill="white"/>
            <rect x="5" y="17" width="12" height="2" rx="1" fill="white"/>
            <!-- Timer arc -->
            <circle cx="21" cy="20" r="5" stroke="white" stroke-width="1.5" fill="none"/>
            <line x1="21" y1="20" x2="21" y2="16.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="21" y1="20" x2="23" y2="21.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <h1 id="app-title">Stream Cue</h1>
      </div>

      <!-- Timer panel -->
      <div id="timer-panel" class="panel">
        <div id="timer-top">
          <div id="timer-status-row">
            <span id="status-dot"></span>
            <span id="status-text">Timer stopped</span>
          </div>
          <div id="timer-actions">
            <button id="start-timer-btn" class="primary-btn">&#9654; Start Timer</button>
            <button id="stop-timer-btn"  class="secondary-btn">&#9646;&#9646; Stop</button>
          </div>
        </div>
        <div id="interval-row">
          <label class="field-label" for="interval-input">Fire every</label>
          <div id="interval-input-group">
            <input type="number" id="interval-input" min="1" max="999" value="30" />
            <span class="unit-label">minutes</span>
          </div>
        </div>
      </div>

      <!-- Cards section -->
      <div id="cards-section">
        <div id="cards-header">
          <span class="section-label">Cue Cards</span>
          <div id="cards-header-actions">
            <button id="reset-btn" class="secondary-btn" title="Reset all dismissed cards">&#8635; Reset Dismissed</button>
            <button id="add-card-btn" class="primary-btn small">&#43; Add Card</button>
          </div>
        </div>
        <div id="card-list">
          <!-- populated by renderer.js -->
        </div>
        <div id="empty-state" class="hidden">
          <p>No cue cards yet.</p>
          <p>Add a card to get started.</p>
        </div>
      </div>

    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════
       READ VIEW (cue card display)
  ═══════════════════════════════════════════════════════════ -->
  <div id="read-view" class="view">

    <!-- Position badge -->
    <div id="position-badge">1 of 1</div>

    <!-- Title bar (fixed above scroll area) -->
    <div id="cue-title-bar">
      <h1 id="cue-title">Cue Title</h1>
    </div>

    <!-- Guide line + arrows (same as teleprompter) -->
    <div id="guide-line"></div>
    <div class="guide-arrow" id="arrow-left">&#9658;</div>
    <div class="guide-arrow" id="arrow-right">&#9668;</div>

    <!-- Scrolling text -->
    <div id="cue-scroller">
      <div id="cue-text"></div>
      <div id="cue-padding-bottom"></div>
    </div>

    <!-- HUD overlay (top-right, same pattern as teleprompter) -->
    <div id="hud-overlay">
      <div id="hud-controls">
        <button id="play-pause-btn" class="hud-btn" title="Play / Pause">
          <span id="play-icon">&#9646;&#9646;</span>
        </button>
        <div class="hud-control-row">
          <span class="hud-label">Speed</span>
          <input type="range" id="hud-speed" min="1" max="200" value="50" class="hud-range" />
          <span class="hud-value" id="hud-speed-val">50</span>
        </div>
      </div>
    </div>

    <!-- Dismiss hint (bottom centre) -->
    <div id="dismiss-hint">
      <kbd>Space</kbd> or <kbd>Enter</kbd> &mdash; dismiss &amp; advance
    </div>

    <!-- Progress bar -->
    <div id="progress-bar-track">
      <div id="progress-bar-fill"></div>
    </div>

  </div>

  <!-- ═══════════════════════════════════════════════════════════
       CARD EDIT MODAL
  ═══════════════════════════════════════════════════════════ -->
  <div id="modal-overlay" class="hidden">
    <div id="modal">
      <div id="modal-header">
        <h2 id="modal-title">Add Card</h2>
        <button id="modal-close" class="icon-btn" title="Cancel">&#215;</button>
      </div>
      <div id="modal-body">
        <label class="field-label" for="modal-card-title">Title</label>
        <input
          type="text"
          id="modal-card-title"
          placeholder="e.g. Sponsor Read"
          spellcheck="false"
          maxlength="80"
        />
        <label class="field-label">Display Mode</label>
        <div id="modal-mode-toggle">
          <button class="mode-btn active" data-mode="scroll">&#9654; Scroll</button>
          <button class="mode-btn"        data-mode="static">&#9776; Static</button>
        </div>
        <label class="field-label" for="modal-card-script">Script</label>
        <textarea
          id="modal-card-script"
          placeholder="Type or paste the script body here…"
          spellcheck="false"
        ></textarea>
      </div>
      <div id="modal-footer">
        <button id="modal-cancel" class="secondary-btn">Cancel</button>
        <button id="modal-save"   class="primary-btn">Save Card</button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
